# ===================================================================
# metadata-ontology — 경량 온톨로지 메타데이터 계층 (정산 도메인)
# 기본/LOCAL 프로필: H2 in-memory (외부 의존성 없음). AWS 미연결.
# ===================================================================

server:
  port: 8096
  shutdown: graceful
  error:
    include-message: always

spring:
  application:
    name: metadata-ontology

  # 기본 활성 프로필: local (H2 + 시드 데이터)
  profiles:
    active: local

  # --- DATASOURCE: H2 in-memory (기본/LOCAL) ---
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:metadb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # --- JPA/HIBERNATE ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop          # LOCAL: 부팅 시 스키마 생성, 종료 시 제거
    properties:
      hibernate:
        format_sql: false
        # meta 스키마(@Table schema="meta")를 H2 에서도 생성
        hbm2ddl:
          create_namespaces: true
        jdbc:
          batch_size: 25
        default_batch_fetch_size: 16

  # --- FLYWAY ---
  # 베이스/LOCAL(H2)에서는 끈다. Flyway 마이그레이션(db/migration, Postgres 문법)은 postgres 프로파일
  # (application-postgres.yml)에서만 활성화한다. H2 는 create-drop + DataSeeder 가 스키마/시드를 관리.
  flyway:
    enabled: false

  # --- JACKSON/JSON ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    default-property-inclusion: non_null
    time-zone: UTC

# --- 동의어 확장 퍼지 폴백 ---
# 정확 매칭 실패 토큰(오타·OOV)에 적용하는 트라이그램 유사도 임계값(pg_trgm 기본 0.3).
# ExpansionService 에 DomainServiceConfig 가 주입(도메인은 설정에 직접 의존하지 않음).
expansion:
  fuzzy:
    threshold: 0.3

# --- 카탈로그 동기화 플래그 (기본 OFF — AWS 미연결) ---
# true 로 켜도 CatalogSyncService.sync() 는 아직 미구현 (TODO(AWS)).
catalog:
  sync:
    enabled: false

# --- ACTUATOR ---
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /management
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# --- SPRINGDOC / SWAGGER ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.hris.metadata

logging:
  level:
    root: INFO
    com.hris.metadata: INFO
    org.hibernate: WARN

